name: Daily database backup

on:
  schedule:
    - cron: '0 2 * * *' # 2am UTC daily
  workflow_dispatch: # allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install pg_dump v17
        run: |
          sudo apt-get install -y gnupg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/postgresql.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        run: |
          set -o pipefail
          pg_dump "${{ secrets.BACKUP_DATABASE_URL }}" | gzip > backup-$(date +%Y-%m-%d).sql.gz

      - name: Clone or init backup repo
        run: |
          git clone https://x-access-token:${{ secrets.BACKUP_REPO_PAT }}@github.com/${{ secrets.BACKUP_REPO }}.git backup-repo || true
          if [ ! -d backup-repo/.git ]; then
            mkdir -p backup-repo
            cd backup-repo
            git init
            git remote add origin https://x-access-token:${{ secrets.BACKUP_REPO_PAT }}@github.com/${{ secrets.BACKUP_REPO }}.git
          fi

      - name: Commit and push backup
        run: |
          cp backup-$(date +%Y-%m-%d).sql.gz backup-repo/
          cd backup-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Keep only the last 30 backups
          ls -t *.sql.gz | tail -n +31 | xargs -r git rm
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "backup: $(date +%Y-%m-%d)"
          git push --set-upstream origin main
